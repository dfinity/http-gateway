name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test_rust:
    name: Build and Test Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Setup DFX
        uses: dfinity/setup-dfx@e50c04f104ee4285ec010f10609483cf41e4d365 # main
        with:
          dfx-version: 'auto'

      - name: Install PocketIC server
        uses: dfinity/pocketic@20c33db1aa87cc6ece50857ac632c37acf5e0322 # main
        with:
          pocket-ic-server-version: '12.0.0'

      - name: Confirm successful installation
        run: ${POCKET_IC_BIN} --version

      - name: Build canisters
        run: dfx build --check

      - name: Test Cargo crates
        run: cargo test --all-features

      - name: Build Cargo docs
        run: cargo doc --no-deps

      - name: Lint Rust
        run: cargo clippy --all-targets --all-features

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
